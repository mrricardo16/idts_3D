name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: repository-policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check changed paths and text diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          base_sha=""
          case "$EVENT_NAME" in
            pull_request)
              base_sha="$PR_BASE_SHA"
              ;;
            push)
              if [[ "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${EVENT_BEFORE}^{commit}"; then
                base_sha="$EVENT_BEFORE"
              fi
              ;;
            workflow_dispatch)
              if git rev-parse "${HEAD_SHA}^" >/dev/null 2>&1; then
                base_sha="${HEAD_SHA}^"
              fi
              ;;
          esac

          bash .github/scripts/check-repository-policy.sh "$base_sha" "$HEAD_SHA"

  backend-quality:
    name: backend-quality
    needs: repository-policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: idts3D_api/global.json
      - name: Display .NET information
        run: dotnet --info
      - name: Restore backend solution
        run: dotnet restore idts3D_api/HZ.IDTS.DigitalTwin.sln
      - name: Build backend solution
        run: dotnet build idts3D_api/HZ.IDTS.DigitalTwin.sln --configuration Release --no-restore
      - name: Run Application Tests
        run: dotnet test idts3D_api/tests/HZ.IDTS.DigitalTwin.Application.Tests/HZ.IDTS.DigitalTwin.Application.Tests.csproj --configuration Release --no-build
      - name: Run Architecture Tests
        run: dotnet test idts3D_api/tests/HZ.IDTS.DigitalTwin.Architecture.Tests/HZ.IDTS.DigitalTwin.Architecture.Tests.csproj --configuration Release --no-build
      - name: Run API Integration Tests
        run: dotnet test idts3D_api/tests/HZ.IDTS.DigitalTwin.Api.IntegrationTests/HZ.IDTS.DigitalTwin.Api.IntegrationTests.csproj --configuration Release --no-build

  frontend-quality:
    name: frontend-quality
    needs: repository-policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: idts3D_ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: idts3D_ui/package-lock.json
      - name: Display Node.js information
        run: |
          node --version
          npm --version
      - name: Install frontend dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run TypeScript type check
        run: npm run type-check
      - name: Run frontend unit tests
        run: npm run test:unit
      - name: Build frontend
        run: npm run build
